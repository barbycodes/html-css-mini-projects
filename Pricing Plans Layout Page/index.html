<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pricing Plans</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <h1>Pricing Plans</h1>

  <div class="pricing-container">

    <div class="pricing-card basic-plan">
      <h2>Basic</h2>
      <p>$9/month</p>
      <ul>
        <li>Basic support</li>
        <li>1 project</li>
      </ul>
    </div>

    <div class="pricing-card pro-plan">
      <h2>Pro</h2>
      <p>$19/month</p>
      <ul>
        <li>Priority support</li>
        <li>10 projects</li>
      </ul>
    </div>

    <div class="pricing-card premium-plan">
      <h2>Premium</h2>
      <p>$29/month</p>
      <ul>
        <li>24/7 support</li>
        <li>Unlimited projects</li>
      </ul>
    </div>

  </div>
</body>
</html>
